# Compiles sidecar/mf_entry.py into standalone Nuitka binaries for every platform
# Fusion needs to embed via rust-embed (DI-4631).
#
# The pull_request trigger is temporary validation scaffolding for DI-4819: workflow_dispatch
# can't be invoked via API/CLI until this file exists on the default branch, so a draft PR is
# the only way to prove the new MACOS_RUNNER_INTEL leg actually compiles and validates before
# merging. Remove it once that leg is proven (or once it's clear it needs more org-side work).
name: Build Sidecar Binaries

on:
  push:
    # Mirrors the MetricFlow release tag pattern in cd-push-metricflow-to-pypi.yaml.
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
  pull_request:
    paths:
      - "sidecar/**"
      - "pyproject.toml"
      - ".github/workflows/cd-build-sidecar-binaries.yaml"

jobs:
  build:
    name: Compile & Validate mf_entry (${{ matrix.target-triple }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target-triple: aarch64-apple-darwin
          # DI-4819: was macos-13 (GitHub's free-tier Intel Mac pool), which sat in
          # `queued` with no runner assigned for 2+ hours in testing -- a hung leg here
          # would block `publish` (needs: build) for every other platform. Depot -- fs's
          # and dbt-core v2's route for aarch64-apple-darwin -- turned out not to be a fix:
          # Depot's macOS runners are Apple Silicon only (confirmed via Depot's docs), and
          # Nuitka can't cross-compile the way fs/dbt-core's Rust CLI builds do, since it
          # embeds native CPython plus precompiled per-arch wheels (pydantic-core, duckdb).
          # `vars.MACOS_RUNNER_INTEL` is fs's actual genuine-Intel-hardware path (used for
          # its ADBC/DuckDB driver native builds, which have the same can't-cross-compile
          # constraint) -- a GitHub-hosted paid "larger runner" (macos-15-intel), not Depot.
          # Untested whether this variable is visible to metricflow yet (it may be scoped
          # to fs's repo only); if this leg hangs the same way macos-13 did, that's the
          # signal it isn't, and getting it added is an org-admin ask, not a YAML fix.
          - runner: ${{ vars.MACOS_RUNNER_INTEL }}
            target-triple: x86_64-apple-darwin
          - runner: ubuntu-22.04
            target-triple: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target-triple: aarch64-unknown-linux-gnu
          - runner: windows-latest
            target-triple: x86_64-pc-windows-msvc
    steps:
      - name: Check-out the repo
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # actions/checkout@v4

      - uses: ./.github/actions/setup-python-env
        with:
          hatch-environment-cache-config-json: >-
            {
              "configs": [
                {"hatch_project_directory": ".", "hatch_environment_name": "nuitka-build"}
              ]
            }

      - name: Compile mf_entry with Nuitka
        shell: bash
        run: hatch run nuitka-build:compile

      - name: Validate compiled binary against Python interpreter
        shell: bash
        run: hatch run nuitka-build:validate

      - name: Upload mf_entry.dist for ${{ matrix.target-triple }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: mf_entry-${{ matrix.target-triple }}
          path: sidecar/mf_entry.dist/
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs: build
    # Only publish on an actual release tag. workflow_dispatch and pull_request runs exist
    # to validate the build matrix on real runners and have no tag to attach assets to.
    # `needs: build` already means this only runs if every matrix leg succeeded.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # actions/download-artifact@v4
        with:
          pattern: mf_entry-*
          path: dist

      - name: Package archives and generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          for dir in mf_entry-*/; do
            dir="${dir%/}"
            triple="${dir#mf_entry-}"
            if [[ "$triple" == *windows* ]]; then
              (cd "$dir" && zip -r "../mf_entry-${{ github.ref_name }}-${triple}.zip" .)
            else
              tar -czf "mf_entry-${{ github.ref_name }}-${triple}.tar.gz" -C "$dir" .
            fi
            rm -rf "$dir"
          done
          sha256sum mf_entry-* > SHA256SUMS.txt

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # softprops/action-gh-release@v2
        with:
          files: dist/*
